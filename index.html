<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!--
    This tag tells the browser (and iOS Safari) to:
    - Match the screen width exactly (don't zoom out to show a full desktop page)
    - Start at 1x zoom
    - Disable pinch-to-zoom (we handle all input ourselves)
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <!-- Makes the game run as a true full-screen app when added to the iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />

  <!-- Prevents iOS from turning numbers into phone-call links -->
  <meta name="format-detection" content="telephone=no" />

  <title>My First Game</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Phaser 3 game framework -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!--
    Phaser Scenes — load in dependency order before main.js.
    Each scene must be declared before any scene that transitions to it.
  -->
  <script src="js/scenes/MainMenuScene.js"></script>
  <script src="js/scenes/PlaneSelectScene.js"></script>
  <script src="js/scenes/PilotGameScene.js"></script>

  <!-- Entry point — creates and starts the Phaser game -->
  <script src="js/main.js"></script>

</body>
</html>
